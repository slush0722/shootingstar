<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슈팅스타(Shooting Star) - 공식 다운로드</title>
    <style>
        :root {
            --primary-color: #00d2d3;
            --secondary-color: #ff4757;
            --bg-color: #0f0c1b;
            --card-bg: #1e1b32;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 우주 배경 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 480px;
            width: 90%;
            backdrop-filter: blur(15px);
        }

        /* 아이콘 이미지 스타일 */
        .game-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 20px;
            /* 네온 효과 */
            filter: drop-shadow(0 0 15px rgba(0, 210, 211, 0.6));
            /* 둥둥 떠있는 애니메이션 */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2.8rem;
            margin: 10px 0;
            background: linear-gradient(45deg, var(--primary-color), #54a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a29bfe;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), #54a0ff);
            color: #000;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 210, 211, 0.3);
            margin-bottom: 1.5rem;
        }

        .download-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(0, 210, 211, 0.5);
        }

        .info {
            font-size: 0.85rem;
            color: #636e72;
            letter-spacing: 1px;
        }

        .features {
            text-align: left;
            margin-top: 2.5rem;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .feature-item {
            margin-bottom: 12px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .feature-item::before {
            content: '✓';
            color: var(--primary-color);
            margin-right: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <img src="icon.ico" alt="Shooting Star Icon" class="game-icon">
        
        <h1>슈팅스타</h1>
        <p>현도생이 만든 슈팅게임 <br>당신의 한계에 도전하세요!</p>
        
        <a href="슈팅스타.exe" class="download-btn">DOWNLOAD NOW</a>

        <div class="info">
            V15.0 | Windows 10/11 전용 | 슈팅스타.exe
        </div>

        <div class="features">
            <div class="feature-item">고해상도 60FPS 부드러운 게임 플레이</div>
            <div class="feature-item">화면 밖 투사체 자동 제거 최적화 완료</div>
            <div class="feature-item">압도적 연출의 보스 레이드 패턴</div>
        </div>
    </div>

    <script>
        // 배경 별 생성
        function createStars() {
            const container = document.querySelector('.stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 2 + 'px';
                star.style.position = 'absolute';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = size;
                star.style.height = size;
                star.style.backgroundColor = '#fff';
                star.style.borderRadius = '50%';
                star.style.opacity = Math.random();
                container.appendChild(star);
            }
        }
        createStars();
    </script>
</body>
</html>
