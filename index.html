<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슈팅스타(Shooting Star) - 공식 다운로드</title>
    <style>
        :root {
            --primary-color: #00d2d3;
            --secondary-color: #ff4757;
            --bg-color: #0f0c1b;
            --card-bg: #1e1b32;
            --text-color: #ffffff;
            --accent-color: #2ed573;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .container {
            background: rgba(30, 27, 50, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 아이콘 이미지 스타일 */

        .game-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 20px;
            /* 네온 효과 */
            filter: drop-shadow(0 0 15px rgba(0, 210, 211, 0.6));
            /* 둥둥 떠있는 애니메이션 */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 { margin: 10px 0; font-size: 2.5rem; color: var(--primary-color); }
        p { color: #8f9bb3; line-height: 1.6; margin-bottom: 30px; }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), #48dbfb);
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 210, 211, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 210, 211, 0.5);
        }

        .info { margin-top: 20px; font-size: 0.9rem; color: #57606f; }

        /* --- 패치노트 스크롤 영역 --- */
        .features {
            margin-top: 30px;
            max-height: 250px; /* 스크롤 높이 제한 */
            overflow-y: auto;  /* 세로 스크롤 활성화 */
            padding-right: 10px;
            text-align: left;
        }

        /* 커스텀 스크롤바 스타일 */
        .features::-webkit-scrollbar { width: 6px; }
        .features::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .features::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        .patch-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
        }

        .patch-version {
            color: var(--primary-color);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .patch-date { font-size: 0.8rem; color: #636e72; }

        .patch-content {
            font-size: 0.9rem;
            color: #bdc3c7;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .patch-content li {
            margin-bottom: 5px;
            position: relative;
            padding-left: 15px;
        }

        .patch-content li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <img src="icon.ico" alt="Shooting Star Icon" class="game-icon">
        
        <h1>슈팅스타</h1>
        <p>현도생이 만든 슈팅게임 <br>당신의 한계에 도전하세요!</p>
        
        <a href="슈팅스타.exe" class="download-btn">DOWNLOAD NOW</a>

        <div class="info">
            V16.2 fix | Windows 10/11 전용 | 슈팅스타.exe
        </div>

        <div class="features">
            <div class="patch-item">
                <div class="patch-version">
                    V16.3 pre (예정) <span class="patch-date">2026.05.28</span>
                </div>
                <ul class="patch-content">
                    <li>편의기능 추가</li>
                    <li>음악재생버그 수정</li>
                </ul>
            </div>

            <div class="patch-item">
                <div class="patch-version">
                    V16.2 pre <span class="patch-date">2026.05.27</span>
                </div>
                <ul class="patch-content">
                    <li>밸런스 패치</li>
                </ul>
            </div>

            <div class="patch-item">
                <div class="patch-version">
                    V16.1 pre <span class="patch-date">2026.05.23</span>
                </div>
                <ul class="patch-content">
                    <li>버그 수정및 최적화</li>
                </ul>
            </div>

            <div class="patch-item">
                <div class="patch-version">
                    V16.0 pre <span class="patch-date">2026.05.22</span>
                </div>
                <ul class="patch-content">
                    <li>밸런스패치</li>
                    <li>잔버그 수정</li>
                    <li>2번째 보스 개편</li>
                    <li>2번째 보스 스킬 UI 개편</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 배경 별 생성 (기존 스크립트 동일)
        function createStars() {
            const container = document.querySelector('.stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.background = '#fff';
                star.style.borderRadius = '50%';
                star.style.position = 'absolute';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.opacity = Math.random();
                star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite`;
                container.appendChild(star);
            }
        }
        createStars();
    </script>
</body>
</html>
